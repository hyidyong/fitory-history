    const DB_NAME = "fitory-storage-db";
    const STORE_NAME = "kv-store";
    const openStorageDB = () => new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => req.result.createObjectStore(STORE_NAME);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
    window.storage = {
        get: async (key) => {
            const db = await openStorageDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readonly");
                const req = tx.objectStore(STORE_NAME).get(key);
                req.onsuccess = () => resolve(req.result ? { value: req.result } : null);
                req.onerror = () => reject(req.error);
            });
        },
        set: async (key, value) => {
            const db = await openStorageDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readwrite");
                tx.objectStore(STORE_NAME).put(value, key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }
    };

        try{const res=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url.trim())}`);const data=await res.json();const html=data.contents||"";
          const g=p=>{const m=html.match(new RegExp(`<meta[^>]+(?:property|name)=["']${p}["'][^>]+content=["']([^"']+)["']`,"i"))||html.match(new RegExp(`<meta[^>]+content=["']([^"']+)["'][^>]+(?:property|name)=["']${p}["']`,"i"));return m?m[1].trim():"";};
          setPrev(p=>({...p,title:(g("og:title")||g("twitter:title")||(html.match(/<title[^>]*>([^<]+)<\/title>/i)||[])[1]||"").slice(0,120),desc:(g("og:description")||g("twitter:description")||"").slice(0,300),thumb:g("og:image")||g("twitter:image")||"",outlet:g("og:site_name")||""}));
          setStep(2);}catch{setStep(2);}setFetching(false);
      };

      const parseArticle=async()=>{
        if(!pasted.trim())return;setParsing(true);
        try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:`다음 한국 뉴스 기사에서 정보를 추출하세요. JSON만 반환:
    {"outlet":"언론사명","journalist":"기자이름(기자 제외)","title":"기사제목"}
    기사:\n${pasted.slice(0,2000)}`}]})});
          const data=await res.json();const raw=data.content?.[0]?.text||"{}";
          const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
          const oc=OUTLET_COLORS[parsed.outlet]||"#6B7280";
          setPrev(p=>({...p,...parsed,outletColor:oc}));
        }catch{}setParsing(false);setStep(2);
      };

      const submit=async()=>{
        if(!prev.title.trim()&&!url)return;
        await onSave({date,title:prev.title||url,desc:prev.desc,url,thumb:prev.thumb,outlet:prev.outlet,journalist:prev.journalist,outletColor:prev.outletColor||OUTLET_COLORS[prev.outlet]||"#6B7280",fullText:pasted,createdAt:Date.now()});
      };

      return(<div style={{flex:1,overflow:"auto",background:"#F2F2F7",paddingTop:"env(safe-area-inset-top)"}}>

          <span style={{fontSize:16,fontWeight:600,color:"#000"}}>뉴스 스크랩</span>
          <button onClick={step<2?()=>setStep(2):submit} style={{background:"none",border:"none",color:"#007AFF",fontSize:15,fontWeight:700,cursor:"pointer",padding:0}}>{step<2?"건너뛰기":"저장"}</button>
        </div>
        <div style={{background:"#fff",display:"flex",borderBottom:"1px solid #F2F2F7"}}>
          {["URL","전문","미리보기"].map((s,i)=><button key={i} onClick={()=>setStep(i)} style={{flex:1,background:"none",border:"none",borderBottom:`2px solid ${step===i?"#007AFF":"transparent"}`,padding:"11px 0",fontSize:12,fontWeight:step===i?700:400,color:step===i?"#007AFF":"#8E8E93",cursor:"pointer"}}>{s}</button>)}
        </div>
        <div style={{padding:"16px 16px 60px"}}>
          {step===0&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
            <Card style={{padding:"16px"}}>
              <div style={{fontSize:12,fontWeight:600,color:"#8E8E93",marginBottom:10}}>기사 URL</div>
              <div style={{display:"flex",gap:8}}><input value={url} onChange={e=>setUrl(e.target.value)} onKeyDown={e=>e.key==="Enter"&&fetchOG()} placeholder="https://news.naver.com/..." style={{flex:1,background:"#F2F2F7",border:"none",borderRadius:10,padding:"10px 14px",fontSize:14,outline:"none"}}/><button onClick={fetchOG} disabled={fetching||!url.trim()} style={{background:url.trim()?"#007AFF":"#C7C7CC",border:"none",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>{fetching?"…":"불러오기"}</button></div>
            </Card>
            <Card style={{padding:"13px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:14}}>날짜</span><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{fontSize:14,color:"#007AFF",background:"none",border:"none",outline:"none"}}/></Card>
          </div>}
          {step===1&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
            <Card style={{padding:"16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{fontSize:12,fontWeight:600,color:"#8E8E93"}}>기사 전문</span><button onClick={parseArticle} disabled={parsing||!pasted.trim()} style={{background:pasted.trim()?"#007AFF":"#C7C7CC",border:"none",borderRadius:20,padding:"6px 14px",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>{parsing?"분석 중…":"기자·언론사 추출"}</button></div>
              <textarea value={pasted} onChange={e=>setPasted(e.target.value)} placeholder="기사 본문을 붙여넣으세요&#10;기자 이름, 언론사가 자동으로 추출됩니다" rows={10} style={{width:"100%",background:"#F2F2F7",border:"none",borderRadius:10,padding:"12px",fontSize:13,outline:"none",resize:"none",lineHeight:1.7,fontFamily:"inherit"}}/>
            </Card>
          </div>}
          {step===2&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
            <Card style={{overflow:"hidden"}}>
              <input ref={thumbRef} type="file" accept="image/*" style={{display:"none"}} onChange={async e=>{const f=e.target.files?.[0];if(f){const d=await toB64(f);setPrev(p=>({...p,thumb:d}));}}}/>
              <div style={{width:"100%",aspectRatio:"16/9",background:"#F2F2F7",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden",cursor:"pointer"}} onClick={()=>thumbRef.current?.click()}>
                {prev.thumb?<img src={prev.thumb} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.parentNode.innerHTML="<span style='font-size:32px'>📸</span>";}}/>:<span style={{fontSize:32}}>📸</span>}
                <div style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,.6)",borderRadius:8,padding:"5px 10px",color:"#fff",fontSize:11}}>📷 변경</div>
              </div>
              <div style={{padding:"14px 16px"}}><input value={prev.title} onChange={e=>setPrev(p=>({...p,title:e.target.value}))} style={{width:"100%",fontSize:16,fontWeight:700,color:"#000",background:"none",border:"none",outline:"none",letterSpacing:"-0.025em",borderBottom:"1px solid #F2F2F7",paddingBottom:10,marginBottom:10}} placeholder="기사 제목"/><textarea value={prev.desc} onChange={e=>setPrev(p=>({...p,desc:e.target.value}))} rows={2} style={{width:"100%",fontSize:13,color:"#8E8E93",background:"none",border:"none",outline:"none",resize:"none",lineHeight:1.6,fontFamily:"inherit"}} placeholder="요약"/></div>
            </Card>
            <Card style={{overflow:"hidden"}}>
              <Row label="언론사"><div style={{display:"flex",gap:8,alignItems:"center"}}>{prev.outlet&&<span style={{background:prev.outletColor||"#8E8E93",color:"#fff",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>{prev.outlet}</span>}<input value={prev.outlet} onChange={e=>setPrev(p=>({...p,outlet:e.target.value,outletColor:OUTLET_COLORS[e.target.value]||p.outletColor}))} placeholder="조선일보" style={{background:"#F2F2F7",border:"none",borderRadius:8,padding:"5px 10px",fontSize:13,outline:"none",width:90,textAlign:"right"}}/></div></Row>
              <Row label="기자" border><input value={prev.journalist} onChange={e=>setPrev(p=>({...p,journalist:e.target.value}))} placeholder="홍길동" style={{flex:1,background:"none",border:"none",outline:"none",fontSize:14,color:"#000",textAlign:"right"}}/></Row>
              <Row label="날짜" border><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{fontSize:14,color:"#007AFF",background:"none",border:"none",outline:"none"}}/></Row>
            </Card>
          </div>}
        </div>
      </div>);
    }

    // CALENDAR
    // ══════════════════════════════════════════════════════════
    function CalendarScreen({entries,onEntry,onAdd}){
      const [year,setYear]=useState(today.getFullYear());
      const [month,setMonth]=useState(today.getMonth());
      const [sel,setSel]=useState(null);

      const firstDay=new Date(year,month,1).getDay();
      const pad=firstDay===0?6:firstDay-1;
      const dim=new Date(year,month+1,0).getDate();
      const byDate=entries.reduce((acc,e)=>{if(!acc[e.date])acc[e.date]=[];acc[e.date].push(e);return acc;},{});
      const dk=d=>`${year}-${pad2(month+1)}-${pad2(d)}`;
      const pM=()=>{if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1);setSel(null);};
      const nM=()=>{if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1);setSel(null);};
      const selEntries=sel?byDate[dk(sel)]||[]:[];
      const DAYS=["월","화","수","목","금","토","일"];

      return(<div style={{flex:1,overflow:"auto",background:"#F2F2F7",paddingTop:"env(safe-area-inset-top)"}}>
        <div style={{background:"#fff",padding:"16px 20px 12px",borderBottom:"1px solid rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <button onClick={pM} style={{background:"none",border:"none",cursor:"pointer",padding:"6px 10px",fontSize:20,color:"#007AFF"}}>‹</button>
            <div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:"#000",letterSpacing:"-0.03em"}}>{year}년 {month+1}월</div><div style={{fontSize:11,color:"#8E8E93",marginTop:2}}>{Object.keys(byDate).filter(k=>k.startsWith(`${year}-${pad2(month+1)}`)).reduce((s,k)=>s+(byDate[k]?.length||0),0)}개 기록</div></div>
            <button onClick={nM} style={{background:"none",border:"none",cursor:"pointer",padding:"6px 10px",fontSize:20,color:"#007AFF"}}>›</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
            {DAYS.map((d,i)=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:600,color:i===6?"#FF3B30":i===5?"#007AFF":"#8E8E93",padding:"2px 0"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"1px",background:"#F0F0F0",border:"1px solid #F0F0F0",borderRadius:10,overflow:"hidden"}}>
            {Array(pad).fill(null).map((_,i)=><div key={"p"+i} style={{background:"#FAFAFA",minHeight:76}}/>)}
            {Array(dim).fill(null).map((_,i)=>{
              const d=i+1; const key=dk(d); const evs=byDate[key]||[];
              const isToday=d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
              const isSel=d===sel; const dow=(pad+i)%7;
              return(<div key={d} onClick={()=>setSel(d===sel?null:d)} style={{background:isSel?"#EFF6FF":"#fff",minHeight:76,padding:"4px 3px",cursor:"pointer",overflow:"hidden"}}>
                <div style={{width:22,height:22,borderRadius:11,background:isToday?"#007AFF":"transparent",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:2}}>
                  <span style={{fontSize:12,fontWeight:isToday?700:400,color:isToday?"#fff":dow===6?"#FF3B30":dow===5?"#007AFF":"#000"}}>{d}</span>
                </div>
                {evs.slice(0,3).map((e,ei)=>{const c=getCat(e.category);return(<div key={ei} style={{background:c.color,borderRadius:4,padding:"2px 4px",marginBottom:2}}>
                  <span style={{fontSize:9,fontWeight:600,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"block",lineHeight:1.4}}>{e.title.length>7?e.title.slice(0,7)+"…":e.title}</span>
                </div>);})}
                {evs.length>3&&<div style={{fontSize:8,color:"#8E8E93",fontWeight:600,paddingLeft:2}}>+{evs.length-3}</div>}
              </div>);
            })}
          </div>
        </div>
        <div style={{padding:"12px 12px 100px"}}>
          {sel?(<div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 4px 10px"}}>
              <span style={{fontSize:15,fontWeight:700,color:"#000"}}>{month+1}월 {sel}일</span>
              <button onClick={()=>onAdd(dk(sel))} style={{background:"#007AFF",border:"none",borderRadius:20,padding:"7px 16px",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ 추가</button>
            </div>
            {selEntries.length===0?(<Card style={{textAlign:"center",padding:"40px 20px"}}><div style={{fontSize:24,marginBottom:8}}>📭</div><div style={{fontSize:14,color:"#8E8E93"}}>기록이 없어요</div></Card>)
            :<div style={{display:"flex",flexDirection:"column",gap:6}}>{selEntries.map(e=><EntryRow key={e.id} entry={e} onClick={()=>onEntry(e)}/>)}</div>}
          </div>):(<div style={{textAlign:"center",padding:"40px 20px"}}><div style={{fontSize:24,marginBottom:8}}>👆</div><div style={{fontSize:14,color:"#8E8E93"}}>날짜를 탭해서 기록을 확인해요</div></div>)}
        </div>
      </div>);
    }

          {/* Export */}
          <div><div style={{fontSize:12,fontWeight:600,color:"#8E8E93",marginBottom:8,paddingLeft:4}}>내보내기</div>
            <Card style={{overflow:"hidden"}}>
              <button onClick={exportHTML} disabled={exporting} style={{width:"100%",padding:"15px 16px",background:"none",border:"none",display:"flex",alignItems:"center",gap:12,cursor:"pointer",borderBottom:"1px solid #F2F2F7"}}>
                <span style={{fontSize:20}}>📄</span><div style={{textAlign:"left"}}><div style={{fontSize:14,fontWeight:600,color:"#000"}}>히스토리 HTML 내보내기</div><div style={{fontSize:11,color:"#8E8E93",marginTop:2}}>투자자 공유용 웹 페이지 생성</div></div>
                <svg style={{marginLeft:"auto"}} width="7" height="12" viewBox="0 0 7 12" fill="none" stroke="#C7C7CC" strokeWidth="2" strokeLinecap="round"><path d="M1 1l5 5-5 5"/></svg>
              </button>
              <button onClick={()=>window.print()} style={{width:"100%",padding:"15px 16px",background:"none",border:"none",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                <span style={{fontSize:20}}>🖨️</span><div style={{textAlign:"left"}}><div style={{fontSize:14,fontWeight:600,color:"#000"}}>PDF로 저장</div><div style={{fontSize:11,color:"#8E8E93",marginTop:2}}>인쇄 → PDF 저장 (브라우저 내장)</div></div>
                <svg style={{marginLeft:"auto"}} width="7" height="12" viewBox="0 0 7 12" fill="none" stroke="#C7C7CC" strokeWidth="2" strokeLinecap="round"><path d="M1 1l5 5-5 5"/></svg>
              </button>
            </Card>
          </div>

          {/* Stats */}
          <div><div style={{fontSize:12,fontWeight:600,color:"#8E8E93",marginBottom:8,paddingLeft:4}}>통계</div>
            <Card style={{overflow:"hidden"}}>
              {[["기록",`${entries.length}개`],["뉴스",`${newsItems.length}건`],["팀원",`${team.length}명`]].map(([l,v],i)=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"13px 16px",borderTop:i>0?"1px solid #F2F2F7":"none"}}><span style={{fontSize:14}}>{l}</span><span style={{fontSize:14,fontWeight:600,color:"#8E8E93"}}>{v}</span></div>)}
            </Card>
          </div>
          {byCat.length>0&&<div><div style={{fontSize:12,fontWeight:600,color:"#8E8E93",marginBottom:8,paddingLeft:4}}>카테고리별</div>
            <Card style={{overflow:"hidden"}}>{byCat.sort((a,b)=>b.count-a.count).map((c,i)=><div key={c.id} style={{display:"flex",alignItems:"center",padding:"12px 16px",borderTop:i>0?"1px solid #F2F2F7":"none",gap:12}}>
              <div style={{width:30,height:30,borderRadius:8,background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",color:c.color,fontSize:13}}>{c.icon}</div>
              <span style={{flex:1,fontSize:14,fontWeight:500}}>{c.label}</span>
              <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:50,height:3,borderRadius:2,background:"#F2F2F7"}}><div style={{height:"100%",borderRadius:2,background:c.color,width:`${Math.round(c.count/entries.length*100)}%`}}/></div><span style={{fontSize:13,fontWeight:700,color:c.color,minWidth:14,textAlign:"right"}}>{c.count}</span></div>
            </div>)}</Card>
          </div>}
          <Card style={{overflow:"hidden"}}>{[["앱","Fitory History"],["버전","4.0.0"],["만든 이","히댕 × Claude"]].map(([l,v],i)=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"13px 16px",borderTop:i>0?"1px solid #F2F2F7":"none"}}><span style={{fontSize:14}}>{l}</span><span style={{fontSize:14,color:"#8E8E93"}}>{v}</span></div>)}</Card>
        </div>
      </div>);
    }

    // ══════════════════════════════════════════════════════════
    // MAIN APP
    // ══════════════════════════════════════════════════════════
    function FitoryApp(){
      const [entries,setEntries]=useState([]);const [newsItems,setNewsItems]=useState([]);const [team,setTeam]=useState([]);const [memos,setMemos]=useState([]);
      const [loaded,setLoaded]=useState(false);const [splash,setSplash]=useState(true);
      const [screen,setScreen]=useState("home");const [tab,setTab]=useState("home");
      const [sel,setSel]=useState(null);const [selNews,setSelNews]=useState(null);const [selMember,setSelMember]=useState(null);
      const [prefillDate,setPrefillDate]=useState(null);

      useEffect(()=>{
        (async()=>{
          try{const r=await window.storage.get(SKE);if(r){const d=JSON.parse(r.value);setEntries(d.length>0?d:SEED);}else setEntries(SEED);}catch{setEntries(SEED);}
          try{const r=await window.storage.get(SKN);if(r)setNewsItems(JSON.parse(r.value));}catch{}
          try{const r=await window.storage.get(SKT);if(r){const d=JSON.parse(r.value);setTeam(d.length>0?d:SEED_TEAM);}else setTeam(SEED_TEAM);}catch{setTeam(SEED_TEAM);}
          try{const r=await window.storage.get(SKM);if(r)setMemos(JSON.parse(r.value));}catch{}
          setLoaded(true);setTimeout(()=>setSplash(false),1400);
        })();
      },[]);

      const saveE=async n=>{const s=[...n].sort((a,b)=>new Date(b.date)-new Date(a.date));setEntries(s);try{await window.storage.set(SKE,JSON.stringify(s));}catch{} return s;};
      const saveN=async n=>{const s=[...n].sort((a,b)=>new Date(b.date)-new Date(a.date));setNewsItems(s);try{await window.storage.set(SKN,JSON.stringify(s));}catch{} return s;};
      const saveT=async n=>{setTeam(n);try{await window.storage.set(SKT,JSON.stringify(n));}catch{} return n;};
      const saveM=async n=>{setMemos(n);try{await window.storage.set(SKM,JSON.stringify(n));}catch{} return n;};

      const handleSaveEntry=async fd=>{
        const isEdit=!!sel&&screen==="edit_entry";
        const ne={id:isEdit?sel.id:Date.now().toString(),...fd,createdAt:isEdit?sel.createdAt:Date.now()};
        const upd=isEdit?entries.map(e=>e.id===sel.id?ne:e):[ne,...entries];
        await saveE(upd);
        if(isEdit){setSel(ne);setScreen("detail_entry");}else{setScreen(tab);setPrefillDate(null);}
      };
      const handleSaveNews=async fd=>{const item={id:Date.now().toString(),...fd};await saveN([item,...newsItems]);setScreen("news");setTab("news");};
      const handleSaveMember=async fd=>{
        const isEdit=!!selMember&&screen==="edit_member";
        const nm={id:isEdit?selMember.id:Date.now().toString(),...fd};
        const upd=isEdit?team.map(t=>t.id===selMember.id?nm:t):[...team,nm];
        await saveT(upd);
        if(isEdit){setSelMember(nm);setScreen("detail_member");}else{setScreen("team");setTab("team");}
      };
      const handleAddMemo=async text=>{const m={id:Date.now().toString(),text,createdAt:Date.now()};await saveM([m,...memos]);};
      const handleDeleteMemo=async id=>await saveM(memos.filter(m=>m.id!==id));
      const handleDeleteEntry=async()=>{if(!confirm("삭제할까요?"))return;await saveE(entries.filter(e=>e.id!==sel.id));setScreen(tab);setSel(null);};
      const handleDeleteNews=async()=>{if(!confirm("삭제할까요?"))return;await saveN(newsItems.filter(n=>n.id!==selNews.id));setScreen("news");setTab("news");setSelNews(null);};
      const handleDeleteMember=async()=>{if(!confirm("삭제할까요?"))return;await saveT(team.filter(t=>t.id!==selMember.id));setScreen("team");setTab("team");setSelMember(null);};

      const navTo=t=>{setTab(t);setScreen(t);setSel(null);setSelNews(null);setSelMember(null);setPrefillDate(null);};

      const renderScreen=()=>{
        if(screen==="detail_entry"&&sel) return <EntryDetailScreen entry={sel} onBack={()=>{setScreen(tab);setSel(null);}} onEdit={()=>setScreen("edit_entry")} onDelete={handleDeleteEntry}/>;
        if(screen==="edit_entry") return <AddEntryScreen entry={sel} onSave={handleSaveEntry} onClose={()=>setScreen("detail_entry")}/>;
        if(screen==="add_entry") return <AddEntryScreen prefillDate={prefillDate} onSave={handleSaveEntry} onClose={()=>{setScreen(tab);setPrefillDate(null);}}/>;
        if(screen==="add_news") return <AddNewsScreen onSave={handleSaveNews} onClose={()=>{setScreen("news");setTab("news");}}/>;
        if(screen==="detail_news"&&selNews) return <NewsDetailScreen item={selNews} onBack={()=>{setScreen("news");setSelNews(null);}} onDelete={handleDeleteNews}/>;
        if(screen==="detail_member"&&selMember) return <TeamDetailScreen member={selMember} onBack={()=>{setScreen("team");setSelMember(null);}} onEdit={()=>setScreen("edit_member")} onDelete={handleDeleteMember}/>;
        if(screen==="edit_member") return <AddTeamScreen member={selMember} onSave={handleSaveMember} onClose={()=>setScreen("detail_member")}/>;
        if(screen==="add_member") return <AddTeamScreen onSave={handleSaveMember} onClose={()=>{setScreen("team");setTab("team");}}/>;
        if(tab==="news") return <NewsScreen newsItems={newsItems} onAddNews={()=>setScreen("add_news")} onNewsItem={n=>{setSelNews(n);setScreen("detail_news");}}/>;
        if(tab==="calendar") return <CalendarScreen entries={entries} onEntry={e=>{setSel(e);setScreen("detail_entry");}} onAdd={d=>{setPrefillDate(d);setScreen("add_entry");}}/>;
        if(tab==="team") return <TeamScreen team={team} memos={memos} onAddMember={()=>setScreen("add_member")} onMember={m=>{setSelMember(m);setScreen("detail_member");}} onAddMemo={handleAddMemo} onDeleteMemo={handleDeleteMemo}/>;
        if(tab==="settings") return <SettingsScreen entries={entries} newsItems={newsItems} team={team}/>;
        return <HomeScreen entries={entries} newsItems={newsItems} team={team} onAdd={()=>{setSel(null);setPrefillDate(null);setScreen("add_entry");}} onEntry={e=>{setSel(e);setScreen("detail_entry");}}/>;
      };

      const showNav=["home","news","calendar","team","settings"].includes(screen);

      return(<div style={{width:"100%",height:"100dvh",margin:"0 auto",background:"#fff",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <style>{`@keyframes splashFade{0%{opacity:1}80%{opacity:1}100%{opacity:0}}@keyframes logoIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}@keyframes spin{to{transform:rotate(360deg)}}*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}::-webkit-scrollbar{display:none}@media print{.no-print{display:none}}`}</style>
        {splash&&<div style={{position:"absolute",inset:0,background:"#000",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:100,animation:"splashFade 1.4s ease forwards",pointerEvents:"none"}}>
          <div style={{animation:"logoIn .5s ease both"}}>
            <div style={{width:72,height:72,borderRadius:20,background:"linear-gradient(135deg,#007AFF,#00C2FF)",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16,boxShadow:"0 8px 32px rgba(0,122,255,.5)"}}><span style={{fontSize:32,color:"#fff",fontWeight:900,fontStyle:"italic"}}>F</span></div>
            <div style={{fontSize:14,color:"rgba(255,255,255,0.4)",textAlign:"center",fontWeight:500,letterSpacing:"0.15em"}}>FITORY HISTORY</div>
          </div>
        </div>}
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>{loaded&&renderScreen()}</div>
        {showNav&&<BottomNav active={tab} onNav={navTo}/>}
      </div>);
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FitoryApp />);
  </script>
</body>
</html>
